# Full valid ratchet configuration with all options
[ratchets]
version = "2"
languages = ["rust", "typescript", "python"]
include = ["src/**", "tests/**"]
exclude = ["**/generated/**", "**/vendor/**"]

# Per-rule settings live under [rules]. Enable / disable lives in
# enabled_ratchets / disabled_ratchets (parsed in Phase 1, load-bearing in
# Phase 3 of the ratchet-sets plan).
[rules]
no-todo-comments = { severity = "warning" }

[rules.custom]
legacy-api-usage = { regions = ["src/legacy/**"] }

[output]
format = "human"
color = "auto"
